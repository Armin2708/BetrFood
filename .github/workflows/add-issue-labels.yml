name: Add Technical Labels to User Story Issues

on:
  workflow_dispatch:
  push:
    branches:
      - claude/add-issue-labels-*

permissions:
  issues: write

jobs:
  create-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Create technical labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Create labels if they don't exist
          declare -A LABELS
          LABELS["frontend"]="1D76DB:Involves UI components, screens, and client-side code"
          LABELS["backend"]="D93F0B:Involves server-side logic, API endpoints, and cloud functions"
          LABELS["database"]="0E8A16:Involves data storage, schema design, and queries"
          LABELS["ui-ux"]="C5DEF5:Focused on design, layout, theming, and user experience"
          LABELS["infrastructure"]="F9D0C4:Involves push notifications, CDN, deployment, and external services"
          LABELS["logic"]="FBCA04:Involves business logic, algorithms, and AI processing"

          for label in "${!LABELS[@]}"; do
            IFS=':' read -r color description <<< "${LABELS[$label]}"
            gh label create "$label" --color "$color" --description "$description" --repo "$REPO" 2>/dev/null || \
            gh label edit "$label" --color "$color" --description "$description" --repo "$REPO" 2>/dev/null || \
            echo "Label '$label' already exists"
          done

      - name: Add labels to user story issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          add_labels() {
            local issue=$1
            shift
            local labels="$@"
            for label in $labels; do
              gh issue edit "$issue" --add-label "$label" --repo "$REPO" 2>/dev/null || echo "Failed to add $label to #$issue"
            done
            echo "Updated #$issue with: $labels"
          }

          echo "=== Epic 1: Content System ==="
          add_labels 15 frontend backend database
          add_labels 16 frontend backend database
          add_labels 17 frontend backend
          add_labels 18 frontend backend infrastructure
          add_labels 19 frontend backend database
          add_labels 20 frontend backend database
          add_labels 21 frontend backend database
          add_labels 22 frontend backend database
          add_labels 23 frontend backend logic
          add_labels 24 frontend backend logic
          add_labels 25 frontend ui-ux
          add_labels 26 frontend backend infrastructure
          add_labels 27 frontend
          add_labels 28 frontend backend database
          add_labels 29 frontend backend database
          add_labels 30 frontend backend database
          add_labels 31 frontend backend database
          add_labels 32 frontend
          add_labels 33 frontend backend database
          add_labels 34 frontend backend database
          add_labels 35 frontend backend database
          add_labels 36 frontend backend

          echo "=== Epic 2: User Management System ==="
